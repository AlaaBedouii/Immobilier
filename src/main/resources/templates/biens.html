<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Liste des biens</title>
</head>

<body>

<div class="container mt-4">

    <h1 class="text-center mb-4">Liste des biens</h1>
	<form action="/biens/search" method="get" class="mb-3">

	       <input type="text" name="ville" class="form-control" placeholder="Rechercher par ville">

	       <button class="btn btn-secondary mt-2">Rechercher</button>

	   </form>

    <!-- FORMULAIRE -->
    <h3>Ajouter un bien</h3>

    <form action="/biens/add" method="post" class="row g-2 mb-4">

        <div class="col">
            <input type="text" name="titre" class="form-control" placeholder="Titre" required />
        </div>

        <div class="col">
            <input type="text" name="ville" class="form-control" placeholder="Ville" required />
        </div>

        <div class="col">
            <input type="number" name="prix" class="form-control" placeholder="Prix" required />
        </div>

        <div class="col">
            <button type="submit" class="btn btn-primary">Ajouter</button>
        </div>

    </form>

    <!-- TABLE -->
    <table class="table table-striped">

        <thead>
        <tr>
            <th>ID</th>
            <th>Titre</th>
            <th>Ville</th>
            <th>Prix</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="bien : ${biens}">
            <td th:text="${bien.id}"></td>
            <td th:text="${bien.titre}"></td>
            <td th:text="${bien.ville}"></td>
            <td th:text="${bien.prix}"></td>

            <td>
                <a th:href="@{'/biens/delete/' + ${bien.id}}" class="btn btn-danger btn-sm">Supprimer</a>
                <a th:href="@{'/biens/edit/' + ${bien.id}}" class="btn btn-warning btn-sm">Modifier</a>
            </td>
        </tr>
        </tbody>

    </table>

</div>

</body>
</html>
