<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2>Modifier Bien</h2>

<form action="/biens/update" method="post">

    <input type="hidden" name="id" th:value="${bien.id}" />

    <input type="text" name="titre" class="form-control mb-2" th:value="${bien.titre}" />
    <input type="text" name="ville" class="form-control mb-2" th:value="${bien.ville}" />
    <input type="number" name="prix" class="form-control mb-2" th:value="${bien.prix}" />

    <button class="btn btn-success">Modifier</button>

</form>

</body>
</html>
